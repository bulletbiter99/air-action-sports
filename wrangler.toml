name = "air-action-sports"
main = "worker/index.js"
compatibility_date = "2026-04-03"

[build]
command = "npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "air-action-sports-db"
database_id = "d72ea71b-f12f-4684-93a2-52fbe9037527"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "air-action-sports-uploads"

[triggers]
# Every 15min — sweeps both 24hr and 1hr reminder windows.
# 1hr window (45-75min) needs sub-hourly cadence to avoid misses.
crons = ["*/15 * * * *"]

[vars]
SITE_URL = "https://air-action-sports.bulletbiter99.workers.dev"
FROM_EMAIL = "Air Action Sports <noreply@airactionsport.com>"
REPLY_TO_EMAIL = "actionairsport@gmail.com"
ADMIN_NOTIFY_EMAIL = "actionairsport@gmail.com"

# ---------------------------------------------------------------------------
# Rate limiting bindings (Workers Rate Limiting — Cloudflare beta).
# Each binding has its own namespace_id (arbitrary int, unique per account)
# and enforces `limit` requests per `period` seconds per key.
# Workers RL only supports period=10 or 60.
# ---------------------------------------------------------------------------

# Login: 5 attempts per minute per IP (brute-force guard).
[[unsafe.bindings]]
name = "RL_LOGIN"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

# Forgot-password: 3/min/IP — rate-caps outbound email & token enumeration.
[[unsafe.bindings]]
name = "RL_FORGOT"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 3, period = 60 }

# Token verification (invite + reset): 10/min/IP — online token oracle guard.
[[unsafe.bindings]]
name = "RL_VERIFY_TOKEN"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 10, period = 60 }

# Password-setting flows (reset, accept-invite): 5/min/IP.
[[unsafe.bindings]]
name = "RL_RESET_PWD"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 5, period = 60 }

# Booking checkout: 10/min/IP — caps pending-booking seat-DoS + Stripe spam.
[[unsafe.bindings]]
name = "RL_CHECKOUT"
type = "ratelimit"
namespace_id = "1005"
simple = { limit = 10, period = 60 }

# Public bearer-token lookups (booking detail, waiver): 30/min/IP.
[[unsafe.bindings]]
name = "RL_TOKEN_LOOKUP"
type = "ratelimit"
namespace_id = "1006"
simple = { limit = 30, period = 60 }

# Feedback submission: 3/min/IP — abuse guard on anonymous submissions.
[[unsafe.bindings]]
name = "RL_FEEDBACK"
type = "ratelimit"
namespace_id = "1007"
simple = { limit = 3, period = 60 }

# Feedback screenshot upload: 3/min/IP — caps bandwidth / R2 abuse.
[[unsafe.bindings]]
name = "RL_FEEDBACK_UPLOAD"
type = "ratelimit"
namespace_id = "1008"
simple = { limit = 3, period = 60 }
