# Repo-wide CI for the Air Action Sports Worker. Runs lint + vitest + coverage
# on every PR targeting main or any milestone-* / milestone/* branch.
#
# What this DOES:
#   * `npm ci` (deterministic install from package-lock.json)
#   * `npm run lint` — BLOCKING as of M3 batch 0 (eslint.config.js landed,
#                      closing audit pain-point #8). Errors fail the PR;
#                      warnings are informational.
#   * `npm run test:coverage` — vitest run with v8 coverage (471+ unit tests
#                                as of M3 baseline)
#   * Uploads the HTML coverage report as an artifact for 14 days.
#
# What this does NOT do:
#   * Playwright `npm run test:e2e` — requires a deployed Worker + browser
#                                       binary. Operator-triggered.
#   * `wrangler deploy` — Cloudflare deploy is a separate workflow / a
#                          push-to-main hook on the dashboard side.
#   * Coverage thresholds — measurement only; gating comes in a later milestone.

name: CI

on:
  pull_request:
    branches:
      - main
      - 'milestone-*'
      - 'milestone/**'

# Cancel an in-flight run when the same PR gets a new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Vitest + coverage (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Lint is BLOCKING as of M3 batch 0 — eslint.config.js (flat config)
      # landed; closes audit pain-point #8. Errors fail the PR; warnings
      # remain (253 inherited warnings; new code is held to "no new warnings"
      # informally per code review).
      - name: Lint (blocking)
        run: npm run lint

      - name: Run vitest with coverage
        run: npm run test:coverage

      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14
