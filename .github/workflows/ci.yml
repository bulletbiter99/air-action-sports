# Repo-wide CI for the Air Action Sports Worker. Runs vitest + coverage on
# every PR targeting main or any milestone-* branch.
#
# What this DOES:
#   * `npm ci` (deterministic install from package-lock.json)
#   * `npm run lint` — non-blocking; lint config is currently broken
#                       (docs/audit/08-pain-points.md #8). Surfaces the gap
#                       in every CI run without blocking PRs during M1.
#   * `npm run test:coverage` — vitest run with v8 coverage (216 unit tests
#                                as of m1-batch-7-ci)
#   * Uploads the HTML coverage report as an artifact for 14 days.
#
# What this does NOT do (out of scope for B7):
#   * Playwright `npm run test:e2e` — requires a deployed Worker + browser
#                                       binary. Operator-triggered.
#   * `wrangler deploy` — Cloudflare deploy is a separate workflow / a
#                          push-to-main hook on the dashboard side.
#   * Coverage thresholds — measurement only; gating comes in a later batch.

name: CI

on:
  pull_request:
    branches:
      - main
      - 'milestone-*'

# Cancel an in-flight run when the same PR gets a new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Vitest + coverage (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Lint is currently broken — see docs/audit/08-pain-points.md #8
      # (ESLint 9 + plugins declared in package.json but no eslint.config.js
      # exists). Documented here as a follow-up per the audit's "document
      # in CI; don't fix in B7" guidance. Visible in every CI run so the
      # gap doesn't go silent, but does not block PRs during M1.
      - name: Lint (non-blocking — see audit pain-point #8)
        continue-on-error: true
        run: npm run lint

      - name: Run vitest with coverage
        run: npm run test:coverage

      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14
