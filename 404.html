<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Failed — Page Not Found | Air Action Sports</title>
<meta name="description" content="Page not found. Head back to base and find what you're looking for.">
<link rel="icon" href="images/favicon.ico" type="image/x-icon">
<style>
  :root {
    --olive: #4a5240; --olive-dark: #2c3127; --olive-light: #6b7560;
    --tan: #c8b89a; --tan-light: #e8dcc8;
    --orange: #d4541a; --orange-dark: #a83e12;
    --cream: #f2ede4; --dark: #1a1c18; --mid: #2e3229;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--dark); color: var(--cream); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
  .error-code { font-size: 120px; font-weight: 900; letter-spacing: -4px; color: var(--orange); line-height: 1; }
  .error-title { font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin: 1rem 0 0.5rem; }
  .error-sub { font-size: 15px; color: var(--olive-light); line-height: 1.6; max-width: 440px; margin: 0 auto 2rem; }
  .error-links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  .error-links a {
    display: inline-block; padding: 12px 28px; font-size: 12px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; text-decoration: none; cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-home { background: var(--orange); color: white; border: none; }
  .btn-home:hover { background: var(--orange-dark); }
  .btn-ghost { background: none; color: var(--tan); border: 1px solid rgba(200,184,154,0.3); }
  .btn-ghost:hover { border-color: var(--tan); color: var(--cream); }
  .countdown-redirect { margin-top: 2rem; font-size: 12px; color: var(--olive-light); letter-spacing: 1px; }
</style>
</head>
<body>
  <div class="error-code">404</div>
  <h1 class="error-title">Mission Failed</h1>
  <p class="error-sub">Looks like this position has been overrun. The page you're looking for doesn't exist or has been moved. Fall back to safety.</p>
  <div class="error-links">
    <a href="/" class="btn-home">&#9658; Back to Base</a>
    <a href="/#events" class="btn-ghost">View Events</a>
    <a href="/#contact" class="btn-ghost">Contact Us</a>
  </div>
  <p class="countdown-redirect">Redirecting to home in <span id="redirect-count">10</span> seconds...</p>
  <script>
    let count = 10;
    const el = document.getElementById('redirect-count');
    const timer = setInterval(() => {
      count--;
      el.textContent = count;
      if (count <= 0) { clearInterval(timer); window.location.href = '/'; }
    }, 1000);
  </script>
</body>
</html>
